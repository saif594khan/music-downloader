<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Audio Downloader</title>
  <!-- Tailwind CSS for a modern, beautiful UI -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700/50">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
        Audio Downloader
      </h1>
      <p class="text-slate-400 text-sm mt-1">Convert YouTube links to high-quality MP3s</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label for="urlInput" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
          Paste Media Link
        </label>
        <input 
          type="url" 
          id="urlInput" 
          placeholder="https://www.youtube.com/watch?v=..." 
          class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-sm"
        >
      </div>

      <button 
        id="downloadBtn" 
        class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2 text-sm cursor-pointer"
      >
        <span>Convert & Download</span>
      </button>
    </div>

    <!-- Dynamic Status States -->
    <div id="statusArea" class="mt-6 hidden border-t border-slate-700/50 pt-4">
      <!-- Loading State -->
      <div id="loadingState" class="hidden flex flex-col items-center py-4">
        <div class="animate-spin rounded-full h-8 w-8 border-2 border-slate-600 border-t-indigo-400 mb-3"></div>
        <p class="text-xs text-slate-400 animate-pulse">Downloading track and converting metadata formats...</p>
      </div>

      <!-- Player / Download Ready State -->
      <div id="readyState" class="hidden space-y-4">
        <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3 flex items-center gap-3">
          <span class="text-emerald-400 text-xl">✓</span>
          <p class="text-xs text-emerald-400 font-medium">Conversion successful! Ready to save.</p>
        </div>
        <audio id="audioPlayer" controls class="w-full opacity-90"></audio>
        <a 
          id="saveFileBtn" 
          href="#" 
          class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-2.5 rounded-xl block text-center transition-all text-xs"
        >
          Save MP3 to Computer
        </a>
      </div>

      <!-- Error State -->
      <div id="errorState" class="hidden bg-rose-500/10 border border-rose-500/20 rounded-xl p-3 flex items-start gap-2">
        <span class="text-rose-400 text-sm mt-0.5">⚠️</span>
        <div class="flex-1">
          <p class="text-xs text-rose-400 font-semibold">Pipeline Failed</p>
          <p id="errorDetails" class="text-[11px] text-rose-400/80 mt-0.5 break-words"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Frontend Logic -->
  <script>
    const downloadBtn = document.getElementById('downloadBtn');
    const urlInput = document.getElementById('urlInput');
    const statusArea = document.getElementById('statusArea');
    const loadingState = document.getElementById('loadingState');
    const readyState = document.getElementById('readyState');
    const errorState = document.getElementById('errorState');
    const errorDetails = document.getElementById('errorDetails');
    const audioPlayer = document.getElementById('audioPlayer');
    const saveFileBtn = document.getElementById('saveFileBtn');

    downloadBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) return alert('Please input a valid URL link');

      // Reset UI States
      statusArea.classList.remove('hidden');
      loadingState.classList.remove('hidden');
      readyState.classList.add('hidden');
      errorState.classList.add('hidden');
      downloadBtn.disabled = true;
      downloadBtn.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        const response = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.details || 'Internal server pipeline failure');
        }

        // Process file stream binary blob directly from response
        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        
        // Extract filename clean header if available
        const disposition = response.headers.get('content-disposition');
        let filename = 'converted_audio.mp3';
        if (disposition && disposition.includes('filename=')) {
          filename = disposition.split('filename=')[1].replace(/["']/g, '');
        }

        // Hydrate UI Player elements
        audioPlayer.src = blobUrl;
        saveFileBtn.href = blobUrl;
        saveFileBtn.download = filename;

        loadingState.classList.add('hidden');
        readyState.classList.remove('hidden');
      } catch (err) {
        loadingState.classList.add('hidden');
        errorState.classList.remove('hidden');
        errorDetails.textContent = err.message;
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    });
  </script>
</body>
</html>
