<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Music Downloader</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center font-sans">

  <div class="w-full max-w-lg mx-4 p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl backdrop-blur-md">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">
        Media Extractor
      </h1>
      <p class="text-sm text-slate-400 mt-2">Paste a SoundCloud or YouTube link to grab your MP3 track</p>
    </div>

    <!-- Input Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-xs uppercase tracking-wider font-semibold text-slate-400 mb-2">Media Stream URL</label>
        <input 
          type="text" 
          id="urlInput" 
          placeholder="https://www.youtube.com/watch?... or https://on.soundcloud.com/..." 
          class="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-800 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-sm"
        />
      </div>

      <button 
        onclick="triggerDownload()" 
        id="downloadBtn"
        class="w-full py-3 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 font-semibold rounded-xl text-white shadow-lg shadow-purple-900/30 active:scale-[0.99] transition-all text-sm flex items-center justify-center gap-2"
      >
        <span>Download Song</span>
      </button>
    </div>

    <!-- Status Output Display -->
    <div id="statusBox" class="mt-6 p-4 rounded-xl text-sm hidden border"></div>
  </div>

  <script>
    async function triggerDownload() {
      const urlInput = document.getElementById('urlInput');
      const downloadBtn = document.getElementById('downloadBtn');
      const statusBox = document.getElementById('statusBox');

      let targetUrl = urlInput.value.trim();
      if (!targetUrl) {
        showStatus('Please insert a valid URL link first.', 'error');
        return;
      }

      // Clean up YouTube playlist bloat to protect the API
      try {
        const cleanUrlObj = new URL(targetUrl);
        if (cleanUrlObj.hostname.includes('youtube.com') || cleanUrlObj.hostname.includes('youtu.be')) {
          const videoId = cleanUrlObj.searchParams.get('v');
          if (videoId) {
            targetUrl = `${cleanUrlObj.origin}${cleanUrlObj.pathname}?v=${videoId}`;
          }
        }
      } catch(e) {}

      // Update UI to loading state
      downloadBtn.disabled = true;
      downloadBtn.innerHTML = `
        <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Processing Audio via Cloud Fetch...</span>
      `;
      showStatus('Contacting serverless cluster, extracting streams, and preparing high-quality MP3 container...', 'info');

      try {
        // Calling a highly reliable serverless-friendly streaming backend gateway
        const apiUrl = `https://api.cobalt.tools/api/json`;
        
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            url: targetUrl,
            isAudioOnly: true,
            audioFormat: 'mp3',
            vCodec: 'h264'
          })
        });

        const data = await response.json();

        if (data.status === 'error') {
          throw new Error(data.text || 'Cloud processing failed');
        }

        if (data.status === 'redirect' || data.url) {
          // Trigger file download using a direct anchor click element
          const a = document.createElement('a');
          a.href = data.url;
          // Target blank opens the native file delivery stream safely
          a.target = '_blank';
          document.body.appendChild(a);
          a.click();
          a.remove();
          
          showStatus(`✨ Success! Redirected to stream source. Check your downloads panel!`, 'success');
          urlInput.value = '';
        } else {
          throw new Error('No streaming URL returned from serverless node.');
        }

      } catch (err) {
        showStatus(`Service Error: ${err.message}`, 'error');
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.innerHTML = `<span>Download Song</span>`;
      }
    }

    function showStatus(msg, type) {
      const statusBox = document.getElementById('statusBox');
      statusBox.classList.remove('hidden', 'bg-red-950/40', 'border-red-800', 'text-red-400', 'bg-emerald-950/40', 'border-emerald-800', 'text-emerald-400', 'bg-blue-950/40', 'border-blue-800', 'text-blue-400');
      
      if (type === 'error') {
        statusBox.classList.add('bg-red-950/40', 'border-red-800', 'text-red-400');
      } else if (type === 'success') {
        statusBox.classList.add('bg-emerald-950/40', 'border-emerald-800', 'text-emerald-400');
      } else {
        statusBox.classList.add('bg-blue-950/40', 'border-blue-800', 'text-blue-400');
      }
      statusBox.innerText = msg;
    }
  </script>
</body>
</html>
